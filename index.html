<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chats</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 820px;
    }

    .tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 1.25rem 1.25rem 1rem;
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.18s ease;
      background: radial-gradient(circle at 60% 30%, var(--accent, #6366f1) 0%, transparent 70%);
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      border-color: #333;
    }

    .tile:hover::before {
      opacity: 0.12;
    }

    .tile-icon {
      width: 44px;
      height: 44px;
      margin-bottom: auto;
      object-fit: contain;
      border-radius: 8px;
    }

    .tile-name {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
      position: relative;
    }

    .tile-sub {
      font-size: 0.72rem;
      color: #555;
      margin-top: 0.2rem;
      position: relative;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <h1>AI Chats</h1>
  <div class="grid">

    <a class="tile" href="https://claude.ai/new" target="_blank" style="--accent:#d97706;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=claude.ai&sz=128" alt="Claude">
      <span class="tile-name">Claude</span>
      <span class="tile-sub">Anthropic</span>
    </a>

    <a class="tile" href="https://chatgpt.com/" target="_blank" style="--accent:#10b981;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=chatgpt.com&sz=128" alt="ChatGPT">
      <span class="tile-name">ChatGPT</span>
      <span class="tile-sub">OpenAI</span>
    </a>

    <a class="tile" href="https://gemini.google.com/" target="_blank" style="--accent:#3b82f6;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=gemini.google.com&sz=128" alt="Gemini">
      <span class="tile-name">Gemini</span>
      <span class="tile-sub">Google</span>
    </a>

    <a class="tile" href="https://grok.com/" target="_blank" style="--accent:#8b5cf6;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=grok.com&sz=128" alt="Grok">
      <span class="tile-name">Grok</span>
      <span class="tile-sub">xAI</span>
    </a>

    <a class="tile" href="https://chat.deepseek.com/" target="_blank" style="--accent:#06b6d4;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=deepseek.com&sz=128" alt="DeepSeek">
      <span class="tile-name">DeepSeek</span>
      <span class="tile-sub">DeepSeek AI</span>
    </a>

    <a class="tile" href="https://chat.qwen.ai/" target="_blank" style="--accent:#f59e0b;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=qwen.ai&sz=128" alt="Qwen">
      <span class="tile-name">Qwen</span>
      <span class="tile-sub">Alibaba</span>
    </a>

    <a class="tile" href="https://www.kimi.com/en" target="_blank" style="--accent:#ec4899;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=kimi.com&sz=128" alt="Kimi">
      <span class="tile-name">Kimi</span>
      <span class="tile-sub">Moonshot AI</span>
    </a>

    <a class="tile" href="https://www.perplexity.ai/" target="_blank" style="--accent:#14b8a6;">
      <img class="tile-icon" src="https://www.google.com/s2/favicons?domain=perplexity.ai&sz=128" alt="Perplexity">
      <span class="tile-name">Perplexity</span>
      <span class="tile-sub">Perplexity AI</span>
    </a>

  </div>
</body>
</html>
